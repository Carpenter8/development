<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Information Table</title>

<style>
    body{
        background:#222;
        font-family:Arial, sans-serif;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    table{
        border-collapse:collapse;
        color:white;
        background:#1f1f1f;
        width:700px;
        text-align:center;
    }

    caption{
        font-size:40px;
        font-weight:bold;
        padding:15px;
    }

    th,td{
        border:2px solid gray;
        padding:12px;
        font-size:28px;
    }

    .info{
        font-weight:bold;
        font-size:34px;
    }
</style>

</head>
<body>

<table>

<caption>Student Information</caption>

<tr>
    <th rowspan="6" class="info">Info</th>
    <th rowspan="2">Name</th>
    <th colspan="2">Address</th>
</tr>

<tr>
    <th>City</th>
    <th>House</th>
</tr>

<tr>
    <td>A</td>
    <td>Delhi</td>
    <td>1</td>
</tr>

<tr>
    <td>B</td>
    <td>Mumbai</td>
    <td>2</td>
</tr>

<tr>
    <td>C</td>
    <td>Kolkata</td>
    <td>3</td>
</tr>

<tr>
    <td>D</td>
    <td>Pune</td>
    <td>4</td>
</tr>

</table>

</body>
</html>
